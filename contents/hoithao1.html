<html>
    <head>
        <meta charset="utf-8">
        <title>Kết quả đăng ký</title>
    </head>
    <body>
        <h2 id="tieude">Kết quả đăng ký hội thao</h2>
        <p id="kq"></p>

        <script>
            let pp = new URLSearchParams(window.location.search);
            let ten = pp.get("ten");
            let dc = pp.get("diachi");
            let lop = pp.get("chkLop");
            let cacMon = [];
            if (pp.get("chkBongBan")) cacMon.push("Bóng bàn");
            if (pp.get("chkCoVua")) cacMon.push("Cờ vua");
            if (pp.get("chkCauLong")) cacMon.push("Cầu lông");
            let dsMon = cacMon.length > 0 ? cacMon.join(", ") : "Chưa chọn môn nào";
            document.getElementById("kq").innerHTML = 
                "Cảm ơn bạn <b>" + ten + "</b> (Email: " + dc + ") đã đăng ký tham gia.<br><br>" +
                "<b>Thông tin chi tiết:</b><br>" +
                "- Khối lớp: " + (lop ? lop : "Chưa chọn") + "<br>" +
                "- Môn thi đấu: " + dsMon;
        </script>
    </body>
</html>
